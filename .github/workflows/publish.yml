name: publish

# Builds the sdist + pure-Python wheel and publishes to PyPI via Trusted
# Publishing (OIDC -- no stored token). Triggered by a pushed `v*` tag
# (or manually, which builds 0.0.0 and skips the upload).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      # Pin the project version from the tag (manual runs build 0.0.0).
      - name: Pin version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          python3 scripts/ci/set_version.py "$VERSION"

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist/*

  publish:
    name: publish-to-pypi
    needs: build
    runs-on: ubuntu-latest
    # Only publish for real release tags
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
